name: TerraForge CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ghcr.io/ani12234/terraforge-app:${{ github.sha }}
            ghcr.io/ani12234/terraforge-app:latest

      - name: Copy Kubernetes Manifests to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "k8s/*"
          target: "/home/ec2-user/"

      - name: Deploy to K3s Cluster
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Ensure kubectl works by configuring KUBECONFIG if needed
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            # Apply Kubernetes manifests (namespace, deployment, service, monitoring)
            kubectl apply -f /home/ec2-user/k8s/deployment.yaml
            kubectl apply -f /home/ec2-user/k8s/service.yaml
            kubectl apply -f /home/ec2-user/k8s/monitoring.yaml

            # Update deployment to use the newly built image tag (Git SHA)
            kubectl set image deployment/terraforge-app terraforge-app=ghcr.io/ani12234/terraforge-app:${{ github.sha }}

            # Wait for deployment to rollout successfully
            kubectl rollout status deployment/terraforge-app --timeout=120s
